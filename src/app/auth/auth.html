<div class="auth-page d-flex flex-column justify-content-center align-items-center w-100" style="min-height: 100vh;">
  <p class="fw-bold fs-3 mb-4 text-dark">Task Manager</p>

  <div class="card shadow-sm" style="width: 400px; border-radius: 12px;">
    <div class="card-body p-4">
      
      <app-auth-toggle [(isLoginMode)]="isLoginMode"></app-auth-toggle>
  
      @if (isLoginMode()) {
        <app-login-form></app-login-form>
      } @else {
        <app-register-form></app-register-form>
      }

    </div>
  </div>
</div>
