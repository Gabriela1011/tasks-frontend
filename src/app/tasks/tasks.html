<div class="d-flex justify-content-between align-items-center mb-3">
  <p class="fw-bold fs-4 mb-0">Tasks:</p>
  <button class="btn btn-dark" (click)="openModalForAdd()">Add task</button>
</div>

<table class="table table-striped table-hover align-middle">
  <thead>
    <tr>
      <th>Due Date</th>
      <th>Subject</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody>
    @for (task of tasks(); track task.taskId) {
      <tr>
        <td>{{ task.dueDate | date:'dd-MM-yyyy' }}</td>
        <td>{{ task.taskName }}</td>
        <td>{{ task.statusName }}</td>
        <td>
          <button class="btn btn-outline-danger btn-sm me-2" (click)="deleteTask(task)">Delete</button>
          <button class="btn btn-outline-secondary btn-sm" (click)="openModalForEdit(task)">Edit</button>
        </td>
      </tr>
    }
  </tbody>
</table>
