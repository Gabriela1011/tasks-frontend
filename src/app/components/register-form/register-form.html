<form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    @if (errorMessage()) {
        <div class="alert alert-danger p-2 mb-3 rounded-2 text-center" role="alert">
            {{ errorMessage() }}
        </div>
    }

    <div class="mb-3">
        <label class="form-label fw-semibold">Email *</label>
        <input
            type="email"
            class="form-control"
            formControlName="email"
            placeholder="name@example.com">
        <app-field-error [control]="registerForm.get('email')" label="Email" />
    </div>

    <div class="mb-4">
        <label class="form-label fw-semibold">Password *</label>
        <input
            type="password"
            class="form-control"
            formControlName="password"
            placeholder="Min. 6 characters">
        <app-field-error [control]="registerForm.get('password')" label="Password" />
    </div>

    <div class="mb-3">
        <label class="form-label fw-semibold">Username *</label>
        <input
            type="text"
            class="form-control"
            formControlName="username"
            placeholder="Your name">
        <app-field-error [control]="registerForm.get('username')" label="Username" />
    </div>

    <div class="mb-3">
        <label class="form-label fw-semibold">Date of Birth *</label>
        <input
            type="date"
            class="form-control"
            formControlName="birthDate">
        <app-field-error [control]="registerForm.get('birthDate')" label="Date of birth" />
    </div>

    <button type="submit" class="btn btn-dark w-100 mb-3">Sign Up</button>
</form>
