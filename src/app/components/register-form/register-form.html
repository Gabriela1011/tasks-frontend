<form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" class="form-control" formControlName="email" placeholder="name@example.com">
    </div>
          
    <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" class="form-control" formControlName="password" placeholder="Min. 6 characters">
    </div>

    <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" class="form-control" formControlName="username" placeholder="Your name">
    </div>

    <div class="mb-3">
        <label class="form-label fw-semibold">Date of Birth</label>
        <input type="date" class="form-control" formControlName="birthDate">
    </div>

    <button type="submit" class="btn btn-dark w-100 mb-3">Sign Up</button>
</form>
