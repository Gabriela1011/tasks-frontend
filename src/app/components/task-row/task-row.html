<td>{{ task().dueDate ? (task().dueDate | date:'dd-MM-yyyy') : '—' }}</td>
<td>
  <span class="d-inline-flex align-items-center gap-2">
    {{ task().taskName }}
    @if (isOverdue()) {
      <span class="badge rounded-pill text-bg-danger d-inline-flex align-items-center gap-1">
        <i class="bi bi-exclamation-triangle-fill"></i>
        Overdue
      </span>
    }
  </span>
</td>
<td>
  <select class="form-select form-select-sm w-auto" (change)="onStatusChange($event)">
    @for (status of statusTypes(); track status.statusTypeId) {
      <option [value]="status.statusTypeId" [selected]="status.statusTypeId === task().statusTypeId">
        {{ status.statusName }}
      </option>
    }
  </select>
</td>
<td>{{ task().username ?? 'Unassigned' }}</td>
@if (showActions()) {
  <td class="text-nowrap">
    <button type="button" class="btn btn-outline-danger btn-sm me-2" (click)="delete.emit(task())">Delete</button>
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="edit.emit(task())">Edit</button>
  </td>
}
